# fly.toml — Call It Relayer on Fly.io
#
# Two Fly apps per the D-09 per-network isolation:
#   call-it-relayer-sepolia   (staging — Arbitrum Sepolia)
#   call-it-relayer-mainnet   (production — Arbitrum One)
#
# Operator provisions separate apps:
#   flyctl apps create call-it-relayer-sepolia
#   flyctl apps create call-it-relayer-mainnet
#   flyctl secrets set GCP_PROJECT_ID=call-it-sepolia --app call-it-relayer-sepolia
#   flyctl secrets set GCP_PROJECT_ID=call-it-mainnet --app call-it-relayer-mainnet
#
# Deploy: see Plan 00-05 GitHub Actions workflow (.github/workflows/deploy-relayer.yml)
#
# Phase 4 note: bump memory_mb to 2048 when Playwright CEX scrapers land.

app = "call-it-relayer"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  # Non-secret config — all secrets injected via `flyctl secrets set` (sourced from GCP at deploy)
  # See: .planning/phases/00-foundation/00-02-PLAN.md user_setup section for full list

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = false  # CRITICAL: BullMQ workers + Pyth retry cron cannot tolerate scale-to-zero
  auto_start_machines = true  # Restart on first request if somehow stopped
  min_machines_running = 1    # Always at least one machine up (D-01)

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
    protocol = "http"

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024
  # Phase 4: bump to 2048 when Playwright CEX scrapers land (8 headless Chromium processes)
