specVersion: 1.2.0
description: "Call It subgraph — indexes all 23 event types from CallRegistry, FollowFadeMarket, ChallengeEscrow, SettlementManager, ProfileRegistry on Arbitrum Sepolia (Phase 0 scaffold; contract addresses populated in Phase 1+)"
repository: "https://github.com/call-it/call-it"
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: CallRegistry
    network: arbitrum-sepolia
    source:
      # Phase 0 placeholder: using Sepolia USDC address so Studio deploy pipeline validates.
      # Phase 1+ updates this to the deployed CallRegistry address.
      address: "0x75faf114eafb1BDbe2F0316DF893fd58CE46AA4d"
      abi: CallRegistry
      startBlock: 1
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/call-registry.ts
      entities:
        - Call
        - Position
        - Challenge
        - Settlement
        - Profile
        - RepEvent
        - Dispute
        - QuoteCall
        - ConvictionCap
        - CallerExit
        - SocialLink
        - PayoutClaim
        - PositionExit
        - ChallengePayout
        - DisputeResolution
        - ForceSettlement
        - SettlementDelayed
        - RepCalculatedFallback
        - UnclaimedOverage
        - PaymasterEvent
        - TvlSnapshot
        - CategoryRep
        - LeaderboardEntry
      abis:
        - name: CallRegistry
          file: ./abis/CallRegistry.json
      # Phase 0 stub: block handler so graph-cli validates the mapping file.
      # Phase 1+ replaces with real eventHandlers as contract events are added.
      blockHandlers:
        - handler: handleBlock
  - kind: ethereum/contract
    name: FollowFadeMarket
