specVersion: 1.2.0
description: "Call It subgraph — indexes all events from CallRegistry and ProfileRegistry on Arbitrum Sepolia (Phase 1 real mappings; Phases 2-4 contracts extend this)"
repository: "https://github.com/call-it/call-it"
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: CallRegistry
    network: arbitrum-sepolia
    source:
      # Phase 2 v2: Redeployed CallRegistry on Arbitrum Sepolia (2026-05-30, DeployPhase2.s.sol).
      # Matches CALL_REGISTRY_ARBITRUM_SEPOLIA in packages/shared/src/constants/addresses.ts.
      address: "0x7DAd732764abfC935aD5bf8e5CFF9BEA7B2C234D"
      abi: CallRegistry
      startBlock: 272458669
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/call-registry.ts
      entities:
        - Call
        - Position
        - Challenge
        - Settlement
        - Profile
        - RepEvent
        - Dispute
        - QuoteCall
        - ConvictionCap
        - CallerExit
        - SocialLink
        - PayoutClaim
        - PositionExit
        - ChallengePayout
        - DisputeResolution
        - ForceSettlement
        - SettlementDelayed
        - RepCalculatedFallback
        - UnclaimedOverage
        - PaymasterEvent
        - TvlSnapshot
        - CategoryRep
        - LeaderboardEntry
      abis:
        - name: CallRegistry
          file: ./abis/CallRegistry.json
      eventHandlers:
        - event: CallCreated(indexed uint256,indexed address,uint8,uint96)
          handler: handleCallCreated
        - event: CallQuoted(indexed uint256,indexed uint256)
          handler: handleCallQuoted
        - event: ConvictionCapped(indexed address,uint8,uint8)
          handler: handleConvictionCapped
        - event: AssetAllowlisted(string,bytes32)
          handler: handleAssetAllowlisted
        - event: NftCollectionAllowlisted(indexed address)
          handler: handleNftCollectionAllowlisted
        - event: TvlCapSet(uint256)
          handler: handleTvlCapSet
        - event: SettlementManagerSet(indexed address)
          handler: handleSettlementManagerSet
  - kind: ethereum/contract
    name: ProfileRegistry
    network: arbitrum-sepolia
    source:
      # Phase 2 v2: Redeployed ProfileRegistry on Arbitrum Sepolia (2026-05-30, DeployPhase2.s.sol).
      # Matches PROFILE_REGISTRY_ARBITRUM_SEPOLIA in packages/shared/src/constants/addresses.ts.
      address: "0xAfe239a3606b89Ef65DbBcDb1b87a920052c359E"
      abi: ProfileRegistry
      startBlock: 272458667
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/profile-registry.ts
      entities:
        - Profile
        - SocialLink
        - CategoryRep
        - ConvictionCap
        - PaymasterEvent
        - QuoteCall
        - CallerExit
        - PayoutClaim
      abis:
        - name: ProfileRegistry
          file: ./abis/ProfileRegistry.json
      eventHandlers:
        - event: ProfileUpdated(indexed address,uint32,uint16)
          handler: handleProfileUpdated
        - event: HandleSet(indexed address,string)
          handler: handleHandleSet
        - event: SettlementManagerSet(indexed address)
          handler: handleProfileRegistrySettlementManagerSet
        - event: RelayerSet(indexed address)
          handler: handleRelayerSet
        - event: SocialLinked(indexed address,uint8,string,bytes32)
          handler: handleSocialLinked
        - event: SocialUnlinked(indexed address,uint8)
          handler: handleSocialUnlinked
  - kind: ethereum/contract
    name: FollowFadeMarket
    network: arbitrum-sepolia
    source:
      # Phase 2: Deployed FollowFadeMarket on Arbitrum Sepolia (2026-05-30, DeployPhase2.s.sol).
      # Matches FOLLOW_FADE_MARKET_ARBITRUM_SEPOLIA in packages/shared/src/constants/addresses.ts.
      address: "0x12aafa5a70c3aD8Bd3a52252744f9F7Aa073E362"
      abi: FollowFadeMarket
      startBlock: 272458674
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/follow-fade-market.ts
      entities:
        - Call
        - Position
        - PositionExit
        - CallerExit
        - TvlSnapshot
      abis:
        - name: FollowFadeMarket
          file: ./abis/FollowFadeMarket.json
      eventHandlers:
        - event: Followed(indexed uint256,indexed address,uint256,uint256)
          handler: handleFollowed
        - event: Faded(indexed uint256,indexed address,uint256,uint256)
          handler: handleFaded
        - event: PositionExited(indexed uint256,indexed address,uint8,uint256,uint256)
          handler: handlePositionExited
        - event: CallerExited(indexed uint256,indexed address,uint64,uint256,uint256,int256)
          handler: handleCallerExited
        - event: PoolInitialized(indexed uint256,uint256,uint256)
          handler: handlePoolInitialized
  - kind: ethereum/contract
    name: ChallengeEscrow
    network: arbitrum-sepolia
    source:
      # Phase 3 placeholder — address populated post-deploy (see STATE.md Deferred Live Infra #2).
      # TODO: replace with real address from DeployPhase3.s.sol output + update startBlock.
      # CHALLENGE_ESCROW_ARBITRUM_SEPOLIA is currently 0x0...0 in addresses.ts until deploy runs.
      address: "0x0000000000000000000000000000000000000000"
      abi: ChallengeEscrow
      # TODO: set exact ChallengeEscrow deploy block post-03-03-deploy.
      # Using Phase-2 FollowFadeMarket deploy block (272458674) as a safe not-before floor.
      # This prevents scanning from genesis if the operator forgets to update the block.
      # Replace with the exact ChallengeEscrow deploy block from DeployPhase3.s.sol broadcast output.
      startBlock: 272458674
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/challenge-escrow.ts
      entities:
        - Challenge
        - ChallengePayout
        - UnclaimedOverage
        - TvlSnapshot
      abis:
        - name: ChallengeEscrow
          file: ./abis/ChallengeEscrow.json
      # Pitfall E: blockHandlers removed — Phase 0 stub is gone; only event handlers here.
      eventHandlers:
        - event: ChallengeProposed(indexed uint256,indexed uint256,indexed address,uint96)
          handler: handleChallengeProposed
        - event: ChallengeAccepted(indexed uint256,indexed address,uint96)
          handler: handleChallengeAccepted
        - event: ChallengeRejected(indexed uint256,indexed address)
          handler: handleChallengeRejected
        - event: ChallengeRefunded(indexed uint256,indexed address,uint96)
          handler: handleChallengeRefunded
        - event: ChallengeSettled(indexed uint256,indexed address)
          handler: handleChallengeSettled
        - event: PayoutClaimed(indexed uint256,indexed address,uint256,uint256)
          handler: handlePayoutClaimed
        - event: UnclaimedOverageCreated(indexed uint256,indexed address,uint256)
          handler: handleUnclaimedOverageCreated
  - kind: ethereum/contract
    name: SettlementManager
    network: arbitrum-sepolia
    source:
      # Phase 4 placeholder — address populated when SettlementManager deploys.
      address: "0x0000000000000000000000000000000000000000"
      abi: SettlementManager
      startBlock: 1
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/settlement-manager.ts
      entities:
        - Settlement
        - Dispute
        - DisputeResolution
        - ForceSettlement
        - SettlementDelayed
        - RepCalculatedFallback
        - RepEvent
        - CategoryRep
        - LeaderboardEntry
      abis:
        - name: SettlementManager
          file: ./abis/SettlementManager.json
      blockHandlers:
        - handler: handleBlock
