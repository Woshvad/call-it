# Call It subgraph schema
# 23 entities covering all indexed events from spec §12.1–12.5
# Requirements: OPS-01, OPS-03
# Phase 0 scaffold — mapping implementations land in Phase 1+ when contracts deploy.
#
# graph-cli@0.98.1 requires explicit immutable argument on all @entity directives.
# Mutable (updated by events): @entity(immutable: false)
# Immutable (event-record only, append-only): @entity(immutable: true)

# ── Core entities (mutable — updated across multiple events) ─────────────────

type Call @entity(immutable: false) {
  id: ID!
  caller: Bytes!
  callerProfile: Profile
  marketType: Int!
  eventSubtype: Int
  asset: String!
  stake: BigInt!
  expiry: BigInt!
  conviction: Int!
  status: String!
  outcome: String
  reasoning: String
  createdAt: BigInt!
  settledAt: BigInt
  quoteOf: Call
  positions: [Position!]! @derivedFrom(field: "call")
  quotes: [QuoteCall!]! @derivedFrom(field: "parentCall")
  disputes: [Dispute!]! @derivedFrom(field: "call")
}

type Position @entity(immutable: false) {
  id: ID!
  # Relation reference (set by CallRegistry handlers; nullable for FFM-only positions)
  call: Call
  # String fields used by FollowFadeMarket handlers (id = callId-userHex-side)
  callId: String!
  user: String!
  side: String!
  usdcDeposited: BigInt!
  sharesHeld: BigInt!
  entryTime: BigInt!
  exitedAt: BigInt
  # Legacy fields retained for backward compat with Phase 1 CallRegistry mapping
  stake: BigInt!
  shares: BigInt!
  claimed: Boolean!
}

type Challenge @entity(immutable: false) {
  id: ID!
  call: String!
  challenger: Bytes!
  caller: Bytes!
  challengerStake: BigInt!
  callerStake: BigInt!
  status: String!
  winner: Bytes
  proposedAt: BigInt!
  acceptedAt: BigInt
  settledAt: BigInt
  overageClaimed: Boolean!
}

type Settlement @entity(immutable: false) {
  id: ID!
  call: Call!
  outcome: String!
  priceDelta: BigInt
  settledAt: BigInt!
  finalPrice: BigInt
}

type Profile @entity(immutable: false) {
  id: ID!
  globalRep: Int!
  categoryReps: [CategoryRep!]! @derivedFrom(field: "profile")
  totalCalls: Int!
  settledCalls: Int!
  wins: Int!
  losses: Int!
  twitterHandle: String
  farcasterHandle: String
  handle: String
  displayHandle: String
  tagline: String
  lastActiveAt: BigInt
  calls: [Call!]! @derivedFrom(field: "callerProfile")
}

type Dispute @entity(immutable: false) {
  id: ID!
  call: Call!
  disputer: Bytes!
  evidenceHash: Bytes!
  bondAmount: BigInt!
  status: String!
  raisedAt: BigInt!
  resolvedAt: BigInt
}

type SocialLink @entity(immutable: false) {
  id: ID!
  user: Bytes!
  platform: String!
  handle: String!
  proofHash: Bytes!
  linkedAt: BigInt!
  unlinkedAt: BigInt
}

type UnclaimedOverage @entity(immutable: false) {
  id: ID!
  challengeId: BigInt!
  beneficiary: Bytes!
  amount: BigInt!
  claimed: Boolean!
  timestamp: BigInt!
}

type CategoryRep @entity(immutable: false) {
  id: ID!
  profile: Profile!
  category: String!
  rep: Int!
  updatedAt: BigInt!
}

type LeaderboardEntry @entity(immutable: false) {
  id: ID!
  profile: Profile!
  window: String!
  rank: Int!
  score: BigInt!
  snapshotAt: BigInt!
}

# ── Immutable event-record entities (append-only) ───────────────────────────

type RepEvent @entity(immutable: true) {
  id: ID!
  user: Bytes!
  delta: Int!
  reason: String!
  callId: String!
  fallback: Boolean!
  timestamp: BigInt!
}

type QuoteCall @entity(immutable: true) {
  id: ID!
  parentCall: Call!
  quoter: Bytes!
  stance: String!
  quotedAt: BigInt!
}

type ConvictionCap @entity(immutable: true) {
  id: ID!
  user: Bytes!
  attempted: Int!
  capped: Int!
  timestamp: BigInt!
}

type CallerExit @entity(immutable: false) {
  id: ID!
  # Relation reference (nullable — FFM handlers use string callId below)
  call: Call
  # String callId used by FollowFadeMarket handleCallerExited (id = callId string)
  callId: String!
  exitedAt: BigInt!
  penaltyApplied: BigInt!
  penaltyPaid: BigInt!
  stakeReturned: BigInt!
  reputationDelta: BigInt!
  callerVolumeAtExit: BigInt!
  timestamp: BigInt!
}

type PayoutClaim @entity(immutable: true) {
  id: ID!
  call: Call!
  claimer: Bytes!
  amount: BigInt!
  claimedAt: BigInt!
}

type PositionExit @entity(immutable: true) {
  id: ID!
  # Relation reference (nullable — FFM handlers use string fields below)
  position: Position
  # String fields used by FollowFadeMarket handlePositionExited (id = callId-userHex-timestamp)
  callId: String!
  user: String!
  side: String!
  usdcReturned: BigInt!
  slashAmount: BigInt!
  returnedAmount: BigInt!
  timestamp: BigInt!
  # Legacy alias retained for backward compat
  exitedAt: BigInt!
}

type ChallengePayout @entity(immutable: true) {
  id: ID!
  challengeId: BigInt!
  winner: Bytes!
  payout: BigInt!
  protocolFee: BigInt!
  timestamp: BigInt!
}

type DisputeResolution @entity(immutable: true) {
  id: ID!
  dispute: Dispute!
  finalOutcome: String!
  resolverNote: String
  resolvedAt: BigInt!
}

type ForceSettlement @entity(immutable: true) {
  id: ID!
  call: Call!
  forcedBy: Bytes!
  forcedAt: BigInt!
  finalOutcome: String!
}

type SettlementDelayed @entity(immutable: true) {
  id: ID!
  call: Call!
  attempts: Int!
  lastError: String
  lastAttemptAt: BigInt!
}

type RepCalculatedFallback @entity(immutable: true) {
  id: ID!
  call: Call!
  user: Bytes!
  baselineDelta: Int!
  lowLevelError: String
  timestamp: BigInt!
}

type PaymasterEvent @entity(immutable: true) {
  id: ID!
  user: Bytes!
  txCount: Int!
  daySpendUsdc: BigInt!
  timestamp: BigInt!
}

type TvlSnapshot @entity(immutable: true) {
  id: ID!
  blockNumber: BigInt!
  callRegistryTvl: BigInt!
  followFadeMarketTvl: BigInt!
  challengeEscrowTvl: BigInt!
  totalTvl: BigInt!
  timestamp: BigInt!
}
