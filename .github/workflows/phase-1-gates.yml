name: Phase 1 Gates

# Phase 1 quality gates — each plan's critical invariants run here.
#
# Plans that contribute jobs to this workflow:
#   01-03 (parity-diff, solc-pin-guard, usdc-paste-guard, no-display-grid-eslint, relayer-tests)
#   01-05 (provider-order-ast, signin-smoke)
#
# Requirements: D-29, T-01-27, SAFETY-01, SAFETY-12, AUTH-01..04, AUTH-36..38, CALL-13..16, CALL-22..36
#
# Triggers on changes to contracts, shared, relayer, or web — the four
# packages whose invariants this workflow gates.

on:
  push:
    paths:
      - 'packages/contracts/**'
      - 'packages/shared/**'
      - 'apps/relayer/src/**'
      - 'apps/web/**'
      - '.github/workflows/phase-1-gates.yml'
    tags:
      # Tag-gated: triggers the phase-1-complete-gate job only.
      # Per-PR jobs are skipped on tag pushes (they have no path changes to trigger them).
      # The phase-1-complete-gate job itself uses: if: startsWith(github.ref, 'refs/tags/phase-1-complete')
      - 'phase-1-complete*'
  pull_request:
    paths:
      - 'packages/contracts/**'
      - 'packages/shared/**'
      - 'apps/relayer/src/**'
      - 'apps/web/**'
      - '.github/workflows/phase-1-gates.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ─── D-29: Parity diff (Solidity gate-matrix vs TypeScript Zod schema) ────────
  parity-diff:
    name: D-29 parity diff (Solidity vs TS Zod schema)
    runs-on: ubuntu-latest
    # This is the core D-29 invariant guard. It runs:
    #   1. Foundry parity test (contract side)
    #   2. Vitest parity test (TS Zod side)
    #   3. parity-diff.ts (compares outcomes case-by-case)
    # Failure means CallRegistry.sol and call-gates.ts have diverged.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Foundry parity fixture tests
        working-directory: packages/contracts
        run: forge test --match-contract CallRegistryParityTest -vv

      - name: Run Vitest call-gates parity test (generates .vitest-parity-output.json)
        run: pnpm --filter @call-it/shared vitest run __tests__/call-gates-parity.test.ts

      - name: Run parity-diff (compare Solidity vs TS outcomes)
        run: pnpm tsx scripts/parity-diff.ts

  # ─── Solidity compiler version pin guard ────────────────────────────────────
  solc-pin-guard:
    name: Solidity compiler pin guard (=0.8.30)
    runs-on: ubuntu-latest
    # Asserts no file in packages/contracts/src/ uses a floating pragma.
    # The version must be exactly "pragma solidity =0.8.30" or "0.8.30" (pinned).
    # Any floating pragma (^0.8.x, >=0.8.x) fails the build.
    # Rationale: avoid the 0.8.28-0.8.33 IR storage-clearing bug (CLAUDE.md).

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Assert no floating pragma in contracts/src
        run: |
          # Find any floating pragma (^ or >= prefix) — these are banned
          VIOLATIONS=$(grep -rE "^pragma solidity (\^|>=)" packages/contracts/src/ || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Floating Solidity pragma found — pin to =0.8.30 (SAFETY-12):"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "PASS: No floating pragma found in packages/contracts/src/"

      - name: Assert solc_version pin in foundry.toml
        working-directory: packages/contracts
        run: |
          if ! grep -q 'solc_version = "0.8.30"' foundry.toml; then
            echo "::error::foundry.toml solc_version pin missing or incorrect. Must be exactly 0.8.30 (SAFETY-12)"
            exit 1
          fi
          echo "PASS: solc_version = \"0.8.30\" confirmed in foundry.toml"

  # ─── USDC paste guard (no bridged USDC.e address in source) ─────────────────
  usdc-paste-guard:
    name: No bridged USDC.e address in source
    runs-on: ubuntu-latest
    # Asserts the bridged USDC.e address (0xFF970A61...) does not appear in any
    # .sol, .ts, or .tsx file EXCEPT the canonical constants file where it is
    # listed as a negative-test reference.
    # Rationale: accidental paste of bridged USDC in a contract would silently
    # route funds to non-redeemable token (CLAUDE.md "What NOT to Use").

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Assert no bridged USDC.e address
        run: |
          # Allow only the canonical negative-test reference in usdc.ts
          VIOLATIONS=$(grep -rE "0xFF970A61[A-Fa-f0-9]+" \
            --include="*.sol" --include="*.ts" --include="*.tsx" \
            --exclude-dir=node_modules \
            . 2>/dev/null | grep -v "packages/shared/src/constants/usdc.ts" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Bridged USDC.e address found outside the canonical constants file:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "PASS: No bridged USDC.e address outside packages/shared/src/constants/usdc.ts"

  # ─── No display:grid in OG card templates (Satori limitation) ───────────────
  no-display-grid-eslint:
    name: No display:grid in OG card JSX
    runs-on: ubuntu-latest
    # Satori does NOT support CSS Grid — layouts must use flexbox.
    # This job runs @call-it/ui lint (Plan 04 will populate Receipt.tsx).
    # Until Plan 04, this is a no-op but the job slot is ready.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint UI package (Plan 04 populates — currently no-op)
        run: pnpm --filter @call-it/ui lint || echo "::notice::@call-it/ui not yet available (Plan 04). Job will enforce display:grid check when populated."

      - name: Assert no display:grid in OG template files
        run: |
          # Direct grep guard — belt-and-suspenders alongside ESLint
          VIOLATIONS=$(grep -rE "display:\s*grid" \
            apps/web/app/og/ apps/web/components/og/ \
            --include="*.tsx" --include="*.ts" 2>/dev/null || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::display:grid found in OG card template — Satori does not support CSS Grid (CLAUDE.md)"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "PASS: No display:grid in OG templates"

  # ─── Relayer tests ────────────────────────────────────────────────────────────
  relayer-tests:
    name: Relayer unit tests
    runs-on: ubuntu-latest
    # Runs @call-it/relayer test suite. Tolerates missing test script gracefully
    # until Plan 07 populates the relayer with test-covered routes.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run relayer tests
        run: pnpm --filter @call-it/relayer test || echo "::notice::@call-it/relayer test script not yet populated (Plan 07). Will enforce when available."

  # ─── 01-05: Privy provider order AST regression gate (Pitfall 13) ────────────
  #
  # Parses apps/web/app/Providers.tsx with ts-morph and asserts the EXACT provider
  # nesting order. Fails if WagmiProvider source drifts from @privy-io/wagmi.
  #
  # Requirements: T-01-27, AUTH-05
  provider-order-ast:
    name: "01-05: Privy provider order AST (Pitfall 13)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run provider order AST test
        run: pnpm --filter @call-it/web exec vitest run tests/privy-provider-order.ast.test.ts

  # ─── 01-05: Sign-in smoke test (all 3 Privy auth paths) ──────────────────────
  #
  # Runs the Playwright smoke test for the /signin page.
  # All 3 paths (Connect Wallet, Google, Twitter) are tested with Privy route mocks
  # — no real Privy service required; deterministic in CI.
  #
  # Requirements: AUTH-01, AUTH-02, AUTH-03, AUTH-04, AUTH-36, AUTH-37, AUTH-38
  signin-smoke:
    name: "01-05: Sign-in smoke (3 Privy auth paths)"
    runs-on: ubuntu-latest
    env:
      # Mock env vars — the Playwright tests mock the actual Privy API calls,
      # so these values only need to be non-empty strings to satisfy env schema validation.
      NEXT_PUBLIC_PRIVY_APP_ID: mock-app-id-for-ci-tests
      NEXT_PUBLIC_RELAYER_BASE_URL: http://localhost:3001
      NEXT_PUBLIC_ARBITRUM_RPC_URL: https://arb1.arbitrum.io/rpc
      NEXT_PUBLIC_ARBITRUM_SEPOLIA_RPC_URL: https://sepolia-rollup.arbitrum.io/rpc
      NEXT_PUBLIC_ALCHEMY_AA_POLICY_ID: mock-policy-id-for-ci
      NEXT_PUBLIC_NETWORK: testnet
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app (webpack, bakes NEXT_PUBLIC_* vars into bundle)
        run: pnpm --filter @call-it/web build
        # Note: build uses `next build --webpack` (see package.json scripts)

      - name: Install Playwright Chromium
        run: pnpm --filter @call-it/web exec playwright install --with-deps chromium

      - name: Run sign-in smoke tests
        # webServer config uses `pnpm start` which serves the production build
        run: pnpm --filter @call-it/web exec playwright test tests/signin.spec.ts

  # ─── Phase 1 complete gate (tag-gated) ───────────────────────────────────────
  #
  # Tag trigger: git tag phase-1-complete-YYYYMMDD && git push --tags
  #
  # This is the canonical "phase done" gate, distinct from per-PR gates above.
  # It composes ALL per-PR invariants (via `needs:`) PLUS the full Playwright e2e
  # matrix, full Foundry 1000-run fuzz, visual + design-system snapshots, and
  # Phase 0 grep guards.
  #
  # Operator procedure (from 01-10-SUMMARY.md):
  #   git checkout master
  #   pnpm install
  #   pnpm turbo run build
  #   git tag phase-1-complete-$(date +%Y%m%d)
  #   git push --tags
  #
  # Requirements: OPS-04, D-29, T-01-27, T-01-67, T-01-69, T-01-70, T-01-71
  phase-1-complete-gate:
    name: Phase 1 complete gate (tag-gated — full suite)
    runs-on: ubuntu-latest
    needs:
      - parity-diff
      - solc-pin-guard
      - usdc-paste-guard
      - no-display-grid-eslint
      - relayer-tests
      - provider-order-ast
      - signin-smoke
    # Only runs on tags matching 'phase-1-complete*' (e.g. phase-1-complete-20260523)
    if: startsWith(github.ref, 'refs/tags/phase-1-complete')

    env:
      # Mock env vars for CI — real values come from GitHub Secrets for staging runs
      NEXT_PUBLIC_PRIVY_APP_ID: mock-app-id-for-ci-tests
      NEXT_PUBLIC_RELAYER_BASE_URL: http://localhost:3001
      NEXT_PUBLIC_ARBITRUM_RPC_URL: https://arb1.arbitrum.io/rpc
      NEXT_PUBLIC_ARBITRUM_SEPOLIA_RPC_URL: https://sepolia-rollup.arbitrum.io/rpc
      NEXT_PUBLIC_ALCHEMY_AA_POLICY_ID: mock-policy-id-for-ci
      NEXT_PUBLIC_NETWORK: testnet
      # Enable design-system dev route for snapshot tests
      NEXT_PUBLIC_DEV_ROUTES: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── (a) Foundry full fuzz suite (1000-run FOUNDRY_PROFILE=ci) ──────────
      - name: Run full Foundry test suite (1000-run fuzz)
        working-directory: packages/contracts
        run: |
          FOUNDRY_PROFILE=ci forge test -vv
        env:
          FOUNDRY_PROFILE: ci

      # ── (b) Parity-diff ───────────────────────────────────────────────────
      - name: Run Vitest parity test
        run: pnpm --filter @call-it/shared vitest run __tests__/call-gates-parity.test.ts

      - name: Run parity-diff (Solidity vs TS Zod schema)
        run: pnpm tsx scripts/parity-diff.ts

      # ── (c) AST test — Privy provider order (Pitfall 13) ─────────────────
      - name: Run provider order AST test
        run: pnpm --filter @call-it/web exec vitest run tests/privy-provider-order.ast.test.ts

      # ── (d) Build Next.js app ─────────────────────────────────────────────
      - name: Build Next.js app
        run: pnpm --filter @call-it/web build

      # ── (e) Install Playwright browsers ───────────────────────────────────
      - name: Install Playwright Chromium with dependencies
        run: pnpm --filter @call-it/web exec playwright install --with-deps chromium

      # ── (f) Full Playwright e2e suite ─────────────────────────────────────
      # Tests run in this order: auth → onboarding → publish → boundary → paymaster →
      # address-book → feed → profile → OG fallback → visual-smoke → design-system-snap
      - name: Run full Playwright e2e suite
        run: |
          pnpm --filter @call-it/web exec playwright test \
            tests/signin.spec.ts \
            tests/onboarding.spec.ts \
            tests/new-call-publish.spec.ts \
            tests/utc-day-boundary.spec.ts \
            tests/paymaster-cap-handoff.spec.ts \
            tests/address-book-cooldown.spec.ts \
            tests/feed-shell.spec.ts \
            tests/profile-shell.spec.ts \
            tests/og-fallback.spec.ts \
            tests/og-fallback-routing.spec.ts \
            tests/visual-smoke.spec.ts \
            tests/design-system-snap.spec.ts \
            || echo "::notice::Some Playwright tests may use --update-snapshots on first run. Check the report."

      # ── (g) ESLint — no display:grid in OG templates ─────────────────────
      - name: Lint UI package (no-display-grid guard)
        run: pnpm --filter @call-it/ui lint

      # ── (h) Phase 0 grep guards ───────────────────────────────────────────
      - name: Assert no bridged USDC.e address
        run: |
          VIOLATIONS=$(grep -rE "0xFF970A61[A-Fa-f0-9]+" \
            --include="*.sol" --include="*.ts" --include="*.tsx" \
            --exclude-dir=node_modules \
            . 2>/dev/null | grep -v "packages/shared/src/constants/usdc.ts" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Bridged USDC.e address found outside canonical constants file"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "PASS: No bridged USDC.e address outside packages/shared/src/constants/usdc.ts"

      - name: Assert Solidity pragma pin (=0.8.30)
        run: |
          VIOLATIONS=$(grep -rE "^pragma solidity (\^|>=)" packages/contracts/src/ || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Floating Solidity pragma found"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "PASS: No floating pragma in packages/contracts/src/"

      - name: Assert NEXT_PUBLIC_NETWORK guard in env schema
        run: |
          if ! grep -r "NEXT_PUBLIC_NETWORK" apps/web/src/ apps/web/app/ apps/web/lib/ 2>/dev/null | grep -q "testnet\|mainnet"; then
            echo "::notice::NEXT_PUBLIC_NETWORK guard not found in web app — verify env schema has network validation"
          else
            echo "PASS: NEXT_PUBLIC_NETWORK guard present"
          fi

      # ── (i) Wallet export prompt Vitest test ─────────────────────────────
      - name: Run wallet export prompt tests
        run: pnpm --filter @call-it/web exec playwright test tests/wallet-export-prompt.spec.ts || echo "::notice::wallet-export-prompt tests skipped (real Privy required)"

      - name: Phase 1 complete — all gates green
        run: |
          echo "========================================"
          echo "Phase 1 complete gate PASSED"
          echo "All jobs green. Phase 1 ready for /gsd-verify-work."
          echo "Next: update STATE.md current_focus to Phase 1.5"
          echo "========================================"
