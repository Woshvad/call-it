name: Phase 1 Gates

# Phase 1 quality gates — each plan's critical invariants run here.
#
# Plans that contribute jobs to this workflow:
#   01-03 (parity-diff, solc-pin-guard, usdc-paste-guard, no-display-grid-eslint, relayer-tests)
#   01-05 (provider-order-ast, signin-smoke)
#
# Requirements: D-29, T-01-27, SAFETY-01, SAFETY-12, AUTH-01..04, AUTH-36..38, CALL-13..16, CALL-22..36
#
# Triggers on changes to contracts, shared, ui, relayer, or web — the five
# packages whose invariants this workflow gates.

on:
  push:
    # GitHub gotcha: a `push` block that declares `tags:` but no `branches:` NEVER
    # triggers on branch pushes — this workflow had ZERO runs since repo creation
    # because of exactly that (verified 2026-06-10, quick-260610-vab). `branches`
    # must be declared explicitly alongside `tags`. `paths:` still scopes branch
    # pushes; per GitHub docs, `paths` is not evaluated for tag pushes.
    branches: ['**']
    paths:
      - 'packages/contracts/**'
      - 'packages/shared/**'
      - 'packages/ui/**'
      - 'apps/relayer/**'
      - 'apps/web/**'
      - '.github/workflows/phase-1-gates.yml'
    tags:
      # Tag-gated: on a 'phase-1-complete*' tag push ALL jobs run (paths filters
      # apply at the workflow trigger level and are skipped for tag pushes, not
      # per-job) — desirable: the phase-1-complete-gate job `needs:` all of them.
      # The phase-1-complete-gate job itself uses:
      #   if: startsWith(github.ref, 'refs/tags/phase-1-complete') || workflow_dispatch
      - 'phase-1-complete*'
  pull_request:
    paths:
      - 'packages/contracts/**'
      - 'packages/shared/**'
      - 'packages/ui/**'
      - 'apps/relayer/**'
      - 'apps/web/**'
      - '.github/workflows/phase-1-gates.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ─── D-29: Parity diff (Solidity gate-matrix vs TypeScript Zod schema) ────────
  parity-diff:
    name: D-29 parity diff (Solidity vs TS Zod schema)
    runs-on: ubuntu-latest
    # This is the core D-29 invariant guard. It runs:
    #   1. Foundry parity test (contract side)
    #   2. Vitest parity test (TS Zod side)
    #   3. parity-diff.ts (compares outcomes case-by-case)
    # Failure means CallRegistry.sol and call-gates.ts have diverged.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Foundry parity fixture tests
        working-directory: packages/contracts
        run: forge test --match-contract CallRegistryParityTest -vv

      - name: Run Vitest call-gates parity test (generates .vitest-parity-output.json)
        # `exec vitest` (not `pnpm --filter ... vitest`): @call-it/shared has no
        # "vitest" script — the bare form fails with ERR_PNPM_RECURSIVE_RUN_NO_SCRIPT
        # (latent since this workflow never ran; exposed by quick-260610-vab).
        run: pnpm --filter @call-it/shared exec vitest run __tests__/call-gates-parity.test.ts

      - name: Run parity-diff (compare Solidity vs TS outcomes)
        run: pnpm tsx scripts/parity-diff.ts

  # ─── Solidity compiler version pin guard ────────────────────────────────────
  solc-pin-guard:
    name: Solidity compiler pin guard (=0.8.30)
    runs-on: ubuntu-latest
    # Asserts no file in packages/contracts/src/ uses a floating pragma.
    # The version must be exactly "pragma solidity =0.8.30" or "0.8.30" (pinned).
    # Any floating pragma (^0.8.x, >=0.8.x) fails the build.
    # Rationale: avoid the 0.8.28-0.8.33 IR storage-clearing bug (CLAUDE.md).

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Assert no floating pragma in contracts/src
        run: |
          # Find any floating pragma (^ or >= prefix) — these are banned
          VIOLATIONS=$(grep -rE "^pragma solidity (\^|>=)" packages/contracts/src/ || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Floating Solidity pragma found — pin to =0.8.30 (SAFETY-12):"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "PASS: No floating pragma found in packages/contracts/src/"

      - name: Assert solc_version pin in foundry.toml
        working-directory: packages/contracts
        run: |
          if ! grep -q 'solc_version = "0.8.30"' foundry.toml; then
            echo "::error::foundry.toml solc_version pin missing or incorrect. Must be exactly 0.8.30 (SAFETY-12)"
            exit 1
          fi
          echo "PASS: solc_version = \"0.8.30\" confirmed in foundry.toml"

  # ─── USDC paste guard (no bridged USDC.e address in source) ─────────────────
  usdc-paste-guard:
    name: No bridged USDC.e address in source
    runs-on: ubuntu-latest
    # Asserts the bridged USDC.e address (0xFF970A61...) does not appear in any
    # .sol, .ts, or .tsx file EXCEPT the canonical constants file where it is
    # listed as a negative-test reference.
    # Rationale: accidental paste of bridged USDC in a contract would silently
    # route funds to non-redeemable token (CLAUDE.md "What NOT to Use").

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Assert no bridged USDC.e address
        run: |
          # Allowlist: the canonical negative-test fixtures only (quick-260610-vab —
          # the original single-file allowlist was stale; these 4 files deliberately
          # reference the bridged address as DO-NOT-USE warnings/negative tests):
          #   packages/shared/src/constants/usdc.ts   (canonical negative-test constant)
          #   packages/shared/test/usdc.test.ts        (asserts that constant's value)
          #   packages/contracts/src/constants/USDC.sol (WARNING comment naming the bad address)
          #   packages/contracts/test/USDC.t.sol       (negative-test constant)
          # Any OTHER occurrence indicates a dangerous hardcoded wrong-USDC paste.
          # Build-artifact dirs excluded too (dist/.next/.turbo/out/target): the
          # phase-1-complete-gate job builds shared/ui/web BEFORE this grep runs,
          # and the generated dist/*.d.ts re-declares the negative-test constant.
          # Case-insensitive (-i): addresses pasted from viem/subgraph/explorer
          # output are frequently all-lowercase and would evade a cased match
          # (quick-260610-vab WR-02). The grep -v allowlist filters match on
          # path, not address casing, so they are unaffected.
          VIOLATIONS=$(grep -riE "0xFF970A61[A-Fa-f0-9]+" \
            --include="*.sol" --include="*.ts" --include="*.tsx" \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.next \
            --exclude-dir=.turbo --exclude-dir=out --exclude-dir=target \
            . 2>/dev/null \
            | grep -v "packages/shared/src/constants/usdc.ts" \
            | grep -v "packages/shared/test/usdc.test.ts" \
            | grep -v "packages/contracts/src/constants/USDC.sol" \
            | grep -v "packages/contracts/test/USDC.t.sol" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Bridged USDC.e address found outside the canonical negative-test fixtures:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "PASS: No bridged USDC.e address outside the canonical negative-test fixtures"

  # ─── No display:grid in OG card templates (Satori limitation) ───────────────
  no-display-grid-eslint:
    name: No display:grid in OG card JSX
    runs-on: ubuntu-latest
    # Satori does NOT support CSS Grid — layouts must use flexbox.
    # Runs @call-it/ui lint (eslint src/) — the package is populated; a lint
    # failure fails the job. The former `|| echo` "Plan 04 not yet available"
    # escape was stale and swallowed real failures (quick-260610-vab WR-01).

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint UI package (no-display-grid guard)
        run: pnpm --filter @call-it/ui lint

      - name: Assert no display:grid in OG template files
        run: |
          # Direct grep guard — belt-and-suspenders alongside ESLint
          VIOLATIONS=$(grep -rE "display:\s*grid" \
            apps/web/app/og/ apps/web/components/og/ \
            --include="*.tsx" --include="*.ts" 2>/dev/null || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::display:grid found in OG card template — Satori does not support CSS Grid (CLAUDE.md)"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "PASS: No display:grid in OG templates"

  # ─── Relayer tests ────────────────────────────────────────────────────────────
  relayer-tests:
    name: Relayer unit tests
    runs-on: ubuntu-latest
    # Runs @call-it/relayer test suite (vitest run — 10+ suites under
    # apps/relayer/__tests__/). A test failure fails the job. The former
    # `|| echo` "Plan 07 not yet populated" escape was stale and swallowed
    # real failures since the workflow first ran (quick-260610-vab CR-01).

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run relayer tests
        run: pnpm --filter @call-it/relayer test

  # ─── 01-05: Privy provider order AST regression gate (Pitfall 13) ────────────
  #
  # Parses apps/web/app/Providers.tsx with ts-morph and asserts the EXACT provider
  # nesting order. Fails if WagmiProvider source drifts from @privy-io/wagmi.
  #
  # Requirements: T-01-27, AUTH-05
  provider-order-ast:
    name: "01-05: Privy provider order AST (Pitfall 13)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run provider order AST test
        run: pnpm --filter @call-it/web exec vitest run tests/privy-provider-order.ast.test.ts

  # ─── 01-05: Sign-in smoke test (all 3 Privy auth paths) ──────────────────────
  #
  # Runs the Playwright smoke test for the /signin page.
  # All 3 paths (Connect Wallet, Google, Twitter) are tested with Privy route mocks
  # — no real Privy service required; deterministic in CI.
  #
  # Requirements: AUTH-01, AUTH-02, AUTH-03, AUTH-04, AUTH-36, AUTH-37, AUTH-38
  signin-smoke:
    name: "01-05: Sign-in smoke (3 Privy auth paths)"
    runs-on: ubuntu-latest
    env:
      # Mock env vars — the Playwright tests mock the actual Privy API calls,
      # so these values only need to be non-empty strings to satisfy env schema validation.
      # `test-app-id` is the one mock sentinel EVERY spec's skip guard recognizes:
      # new-call-publish.spec.ts and utc-day-boundary.spec.ts Tier-2 guards match it
      # exactly (`!== 'test-app-id'`), and all other specs' HAS_REAL_PRIVY_APP_ID
      # checks catch it via the `test-` prefix / `test` substring / length < 28.
      # The previous `mock-` prefixed value silently un-skipped two real-Privy
      # Tier-2 browser suites on CI (quick-260610-vab).
      NEXT_PUBLIC_PRIVY_APP_ID: test-app-id
      NEXT_PUBLIC_RELAYER_BASE_URL: http://localhost:3001
      NEXT_PUBLIC_ARBITRUM_RPC_URL: https://arb1.arbitrum.io/rpc
      NEXT_PUBLIC_ARBITRUM_SEPOLIA_RPC_URL: https://sepolia-rollup.arbitrum.io/rpc
      NEXT_PUBLIC_ALCHEMY_AA_POLICY_ID: mock-policy-id-for-ci
      NEXT_PUBLIC_NETWORK: testnet
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app (webpack, bakes NEXT_PUBLIC_* vars into bundle)
        # turbo (not a bare `pnpm --filter` build): apps/web depends on workspace
        # packages @call-it/shared and @call-it/ui whose dist/ is gitignored — a
        # bare filter build fails on a fresh runner. turbo's `^build` dependsOn
        # builds dependencies first (same recipe as the green CI workflow; no
        # TURBO_TOKEN needed — turbo just skips remote cache). (quick-260610-vab)
        run: pnpm turbo run build --filter=@call-it/web
        # Note: build uses `next build --webpack` (see package.json scripts)

      - name: Install Playwright Chromium
        run: pnpm --filter @call-it/web exec playwright install --with-deps chromium

      - name: Run sign-in smoke tests
        # webServer config uses `pnpm start` which serves the production build
        run: pnpm --filter @call-it/web exec playwright test tests/signin.spec.ts

  # ─── Phase 1 complete gate (tag-gated OR dispatchable) ───────────────────────
  #
  # Tag trigger: git tag phase-1-complete-YYYYMMDD && git push --tags
  # Dispatch alternative (no tag needed — exercises the FULL gate on any ref):
  #   gh workflow run "Phase 1 Gates" --ref <branch>
  # Use the dispatch path for pre-master verification of workflow/test changes
  # (quick-260610-vab landed this way: green dispatch run BEFORE merging to master).
  #
  # This is the canonical "phase done" gate, distinct from per-PR gates above.
  # It composes ALL per-PR invariants (via `needs:`) PLUS the full Playwright e2e
  # matrix, full Foundry 1000-run fuzz, visual + design-system snapshots, and
  # Phase 0 grep guards.
  #
  # Operator procedure (from 01-10-SUMMARY.md):
  #   git checkout master
  #   pnpm install
  #   pnpm turbo run build
  #   git tag phase-1-complete-$(date +%Y%m%d)
  #   git push --tags
  #
  # Requirements: OPS-04, D-29, T-01-27, T-01-67, T-01-69, T-01-70, T-01-71
  phase-1-complete-gate:
    name: Phase 1 complete gate (tag-gated — full suite)
    runs-on: ubuntu-latest
    # Full suite is roughly 10-20 min on a 2-core runner; 45 caps a hung
    # Playwright webServer (job default would otherwise be 360 minutes).
    timeout-minutes: 45
    needs:
      - parity-diff
      - solc-pin-guard
      - usdc-paste-guard
      - no-display-grid-eslint
      - relayer-tests
      - provider-order-ast
      - signin-smoke
    # Runs on tags matching 'phase-1-complete*' (e.g. phase-1-complete-20260523)
    # OR on manual workflow_dispatch — dispatch exercises the full gate without
    # pushing a tag (used for pre-master verification, see comment block above).
    if: startsWith(github.ref, 'refs/tags/phase-1-complete') || github.event_name == 'workflow_dispatch'

    env:
      # Mock env vars for CI — real values come from GitHub Secrets for staging runs.
      # `test-app-id` is the one mock sentinel EVERY spec's skip guard recognizes —
      # see the signin-smoke env comment above (quick-260610-vab).
      NEXT_PUBLIC_PRIVY_APP_ID: test-app-id
      NEXT_PUBLIC_RELAYER_BASE_URL: http://localhost:3001
      NEXT_PUBLIC_ARBITRUM_RPC_URL: https://arb1.arbitrum.io/rpc
      NEXT_PUBLIC_ARBITRUM_SEPOLIA_RPC_URL: https://sepolia-rollup.arbitrum.io/rpc
      NEXT_PUBLIC_ALCHEMY_AA_POLICY_ID: mock-policy-id-for-ci
      NEXT_PUBLIC_NETWORK: testnet
      # NEXT_PUBLIC_DEV_ROUTES deliberately NOT set here (quick-260610-vab):
      # design-system-snap goldens are win32-only; baking dev routes into the
      # linux CI build would un-skip its 5 snapshot tests with no linux baselines
      # to compare against, and the gate should test a production-faithful build
      # anyway. Goldens are regenerated on the win32 dev box (command in the
      # design-system-snap.spec.ts header).
      #
      # OG_BENCH_SLO deliberately NOT set (quick-260610-vab, decided 2026-06-10):
      # the provisional OG_BENCH_SLO=1 verification run (dispatch 27309389648)
      # showed the GitHub 2-core runner CANNOT reliably hold the SHARE-11
      # p95 < 100ms warm-render gate — og-fallback-bench Test 3 measured
      # p95 = 150.85ms, then 134.87ms (retry #1), then 99.88ms (retry #2,
      # a 0.12ms margin) and passed only as "flaky". GitHub 2-core runner
      # cannot hold SHARE-11 p95<100ms deterministically; the SLO gate remains
      # opt-in via OG_BENCH_SLO=1 on quiet dedicated hardware.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── (a) Foundry full fuzz suite (1000-run FOUNDRY_PROFILE=ci) ──────────
      - name: Run full Foundry test suite (1000-run fuzz)
        working-directory: packages/contracts
        run: |
          FOUNDRY_PROFILE=ci forge test -vv
        env:
          FOUNDRY_PROFILE: ci

      # ── (b) Parity-diff ───────────────────────────────────────────────────
      - name: Run Vitest parity test
        # `exec vitest` — @call-it/shared has no "vitest" script (see parity-diff job).
        run: pnpm --filter @call-it/shared exec vitest run __tests__/call-gates-parity.test.ts

      - name: Run parity-diff (Solidity vs TS Zod schema)
        run: pnpm tsx scripts/parity-diff.ts

      # ── (c) AST test — Privy provider order (Pitfall 13) ─────────────────
      - name: Run provider order AST test
        run: pnpm --filter @call-it/web exec vitest run tests/privy-provider-order.ast.test.ts

      # ── (d) Build Next.js app ─────────────────────────────────────────────
      - name: Build Next.js app
        # turbo (not a bare `pnpm --filter` build): apps/web depends on workspace
        # packages @call-it/shared and @call-it/ui whose dist/ is gitignored — a
        # bare filter build fails on a fresh runner. turbo's `^build` dependsOn
        # builds dependencies first. (quick-260610-vab)
        run: pnpm turbo run build --filter=@call-it/web

      # ── (e) Install Playwright browsers ───────────────────────────────────
      - name: Install Playwright Chromium with dependencies
        run: pnpm --filter @call-it/web exec playwright install --with-deps chromium

      # ── (f) Full Playwright e2e suite ─────────────────────────────────────
      # Runs the ENTIRE apps/web/tests/ directory (20 specs) with NO explicit
      # file list, so new specs are gated automatically. NO `|| echo` escape —
      # any test failure fails the job (the previous escape made this gate
      # unable to fail; quick-260610-vab). Env-gated tiers self-skip
      # deterministically on CI:
      #   - Tier-2 deployed-URL tests (PLAYWRIGHT_BASE_URL unset)
      #   - real-Privy tiers (test-app-id mock sentinel)
      #   - og-thumbnail-200px (OG_200PX_BASELINES unset)
      #   - og-fallback-bench SLO Test 3 (OG_BENCH_SLO unset — see env comment)
      #   - win32-only visual goldens (in-spec platform guard, quick-260610-vab)
      # `--reporter=list,html` overrides playwright.config.ts's pinned
      # `reporter: 'list'` so the html reporter writes apps/web/playwright-report/
      # for the failure artifact below; it does not auto-open on CI.
      - name: Run full Playwright e2e suite
        run: pnpm --filter @call-it/web exec playwright test --reporter=list,html

      # On failure, ship the HTML report + test-results for debuggability.
      # Traces are recorded on first retry (trace: 'on-first-retry', CI retries: 2),
      # so failures ship with traces.
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          # run_attempt suffix: upload-artifact@v4 409-conflicts if a same-named
          # artifact already exists in the run — run_id alone collides on
          # re-run attempts, exactly the flaky-retry path where the report
          # matters most (quick-260610-vab IN-01).
          name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          if-no-files-found: ignore
          retention-days: 7

      # ── (g) ESLint — no display:grid in OG templates ─────────────────────
      - name: Lint UI package (no-display-grid guard)
        run: pnpm --filter @call-it/ui lint

      # ── (h) Phase 0 grep guards ───────────────────────────────────────────
      - name: Assert no bridged USDC.e address
        run: |
          # Same negative-test-fixture allowlist as the usdc-paste-guard job
          # (quick-260610-vab) — see that job's comment for the rationale.
          # Build-artifact dirs excluded too (dist/.next/.turbo/out/target): the
          # phase-1-complete-gate job builds shared/ui/web BEFORE this grep runs,
          # and the generated dist/*.d.ts re-declares the negative-test constant.
          # Case-insensitive (-i) — see usdc-paste-guard job comment (WR-02).
          VIOLATIONS=$(grep -riE "0xFF970A61[A-Fa-f0-9]+" \
            --include="*.sol" --include="*.ts" --include="*.tsx" \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.next \
            --exclude-dir=.turbo --exclude-dir=out --exclude-dir=target \
            . 2>/dev/null \
            | grep -v "packages/shared/src/constants/usdc.ts" \
            | grep -v "packages/shared/test/usdc.test.ts" \
            | grep -v "packages/contracts/src/constants/USDC.sol" \
            | grep -v "packages/contracts/test/USDC.t.sol" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Bridged USDC.e address found outside the canonical negative-test fixtures"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "PASS: No bridged USDC.e address outside the canonical negative-test fixtures"

      - name: Assert Solidity pragma pin (=0.8.30)
        run: |
          VIOLATIONS=$(grep -rE "^pragma solidity (\^|>=)" packages/contracts/src/ || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Floating Solidity pragma found"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "PASS: No floating pragma in packages/contracts/src/"

      - name: Assert NEXT_PUBLIC_NETWORK guard in env schema
        run: |
          if ! grep -r "NEXT_PUBLIC_NETWORK" apps/web/src/ apps/web/app/ apps/web/lib/ 2>/dev/null | grep -q "testnet\|mainnet"; then
            echo "::notice::NEXT_PUBLIC_NETWORK guard not found in web app — verify env schema has network validation"
          else
            echo "PASS: NEXT_PUBLIC_NETWORK guard present"
          fi

      # NOTE: the former step (i) (re-running wallet-export-prompt.spec.ts with its
      # own `|| echo` escape) was DELETED (quick-260610-vab): the spec now runs
      # inside the whole-suite step (f) — Tier-1 source assertions execute; Tier-2
      # self-skips on the test-app-id mock sentinel.
      - name: Phase 1 complete — all gates green
        run: |
          echo "========================================"
          echo "Phase 1 complete gate PASSED"
          echo "All jobs green. Phase 1 ready for /gsd-verify-work."
          echo "Next: update STATE.md current_focus to Phase 1.5"
          echo "========================================"
