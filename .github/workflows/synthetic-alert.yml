# synthetic-alert.yml — Daily CI cron that fires + verifies a Telegram alert end-to-end (D-16, Pitfall D)
#
# Schedule: 12:00 UTC daily
# Manual trigger: workflow_dispatch (for operator testing)
#
# The job fires a synthetic `rep_fallback` event through the full alert pipeline and
# verifies it via the relayer's SEND-CONFIRMATION response:
#   1. POSTs an HMAC-signed request to the relayer /internal/test-alert
#   2. The relayer dispatches the alert (awaits bot.sendMessage; re-throws on failure)
#      and returns HTTP 200 { ok, nonce, delivered:true } only after Telegram accepts it
#   3. The script verifies that 200 + echoed nonce — NO Telegram getUpdates polling
#
# Why not getUpdates: a Telegram bot cannot read its own OUTGOING messages via getUpdates
# (only incoming updates + channel posts where it is an admin). P0 alerts are delivered to
# a private DM, so getUpdates can never see them. Send-confirmation is the correct check and
# works for a DM or a channel.
#
# If the relayer is unreachable, returns non-200 (HMAC fail / Telegram send fail), or omits
# the nonce → build FAILS (Pitfall D mitigation): the operator is notified via CI failure.
#
# Required GitHub Secrets (operator configures via `gh secret set`):
#   RELAYER_URL            - Deployed relayer URL (e.g., https://call-it-relayer-sepolia.fly.dev)
#   RELAYER_INTERNAL_HMAC  - HMAC secret matching RELAYER_INTERNAL_HMAC_SECRET in the relayer env
#   (Telegram credentials live in the relayer only — the CI no longer calls Telegram directly.)
#
# Security:
#   Secrets are injected via GitHub Secrets → available only to repository admins.
#   The HMAC secret provides a 5-minute replay window on the relayer side.
#   A fresh UUID nonce is generated per run.

name: Synthetic Alert Verification

on:
  schedule:
    - cron: '0 12 * * *'  # Daily at 12:00 UTC
  workflow_dispatch:        # Manual trigger for operator testing

permissions:
  contents: read

jobs:
  fire-and-verify:
    name: Fire synthetic alert + verify relayer send-confirmation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fire synthetic alert + verify relayer send-confirmation
        env:
          RELAYER_URL: ${{ secrets.RELAYER_URL }}
          RELAYER_INTERNAL_HMAC_SECRET: ${{ secrets.RELAYER_INTERNAL_HMAC }}
        run: |
          pnpm tsx scripts/fire-synthetic-alert.ts \
            --event rep_fallback
        # Exit 1 from the script = build FAILS = CI fails = operator notified via GitHub notification
        # This is intentional per D-16: the CI build failing IS the alert.
