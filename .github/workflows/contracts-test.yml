name: Contracts Tests

# Foundry build + test + Stylus WASM compilation.
# Triggers only when contracts/* or this workflow file change (path filtering).
#
# Requirements: SAFETY-12, D-21

on:
  push:
    paths:
      - 'packages/contracts/**'
      - '.github/workflows/contracts-test.yml'
  pull_request:
    paths:
      - 'packages/contracts/**'
      - '.github/workflows/contracts-test.yml'

permissions:
  contents: read

jobs:
  foundry-test:
    name: Foundry build + test (Solidity =0.8.30)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Selector gate — compute_rep_change must be 0xff540eb6
        # T-05-01-01: ABI selector spoofing guard. The Stylus SDK converts snake_case to camelCase
        # by default (compute_rep_change → computeRepChange → selector 0xfe7606ba). The locked
        # IStylusScoreEngine interface requires 0xff540eb6. This gate blocks any ABI change that
        # would silently route SettlementManager calls to the wrong selector.
        # Source: 05-RESEARCH.md "Risk 1: ABI Selector Mismatch"
        working-directory: packages/contracts
        run: |
          SELECTOR=$(cast sig "compute_rep_change(uint128,uint8,uint8,bool,uint256)")
          if [ "$SELECTOR" != "0xff540eb6" ]; then
            echo "::error::FATAL: selector mismatch: got $SELECTOR, expected 0xff540eb6"
            echo "::error::The Stylus SDK converts snake_case to camelCase by default."
            echo "::error::Use #[selector(name = \"compute_rep_change\")] in the Rust engine."
            exit 1
          fi
          echo "PASS: compute_rep_change selector is 0xff540eb6 (matches IStylusScoreEngine)"

      - name: Build contracts
        working-directory: packages/contracts
        run: forge build

      - name: Run Foundry tests
        working-directory: packages/contracts
        run: forge test -vv

      - name: Run CallRegistry unit tests
        working-directory: packages/contracts
        run: forge test --match-contract CallRegistryTest -vv

      - name: Verify solc_version pin in foundry.toml
        working-directory: packages/contracts
        run: |
          if ! grep -q 'solc_version = "0.8.30"' foundry.toml; then
            echo "::error::foundry.toml solc_version pin missing or incorrect. Must be exactly 0.8.30 (SAFETY-12)"
            exit 1
          fi
          echo "PASS: solc_version = \"0.8.30\" confirmed in foundry.toml"

  parity-fixture:
    name: Parity fixture (contract vs TS anti-drift gate)
    runs-on: ubuntu-latest
    # This job is the D-29 anti-drift gate (Phase 1 analog of Phase 0 grep guards).
    # It asserts that gate-matrix.json cases pass on the Solidity side.
    # Plan 03 adds the matching Vitest test on the TypeScript side.
    # If Solidity and TypeScript disagree, the CI parity-diff script fails the build.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run CallRegistry parity fixture tests
        working-directory: packages/contracts
        run: forge test --match-contract CallRegistryParityTest -vv

  gate-fuzz:
    name: Gate fuzz (1000 runs, ci profile)
    runs-on: ubuntu-latest
    # 1000-run fuzz over stake bounds, conviction floor, duplicate hash, TVL cap.
    # Runs on every PR touching contracts/ — may be slow (~2-3min).
    # Use [skip-fuzz] in commit message to bypass during rapid iteration.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run CallRegistry gate fuzz (1000 runs)
        working-directory: packages/contracts
        run: FOUNDRY_PROFILE=ci forge test --match-contract CallRegistryGates -vv

  stylus-check:
    name: Stylus WASM compilation (Rust toolchain pin)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Add wasm32-unknown-unknown target (belt-and-suspenders)
        run: rustup target add wasm32-unknown-unknown

      - name: Build Stylus WASM stub
        # Proves the Cargo.toml pin (stylus-sdk=0.10.7) compiles.
        # Real Stylus engine implementation lands in Phase 5.
        # Note: stylus-sdk is commented out in Phase 0 Cargo.toml;
        # this step proves the basic Rust toolchain + wasm32 target works.
        run: |
          cargo build --manifest-path packages/contracts/stylus/Cargo.toml
          echo "PASS: Rust WASM stub compiles successfully"

      - name: Verify Cargo.toml stylus-sdk version comment
        run: |
          if ! grep -q 'stylus-sdk.*0.10.7' packages/contracts/stylus/Cargo.toml; then
            echo "::warning::stylus-sdk version comment not found in Cargo.toml — verify pin is correct"
          fi
          echo "Cargo.toml check done"
